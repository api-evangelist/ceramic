name: Ceramic
description: Ceramic is a decentralized data network built on a protocol for mutable
  event streams anchored to blockchain. It provides REST APIs for creating and updating
  mutable data streams, managing decentralized identifiers (DIDs), registering data
  interests, and reading stream state and events across the composable data network.
