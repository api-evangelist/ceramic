- Web3
- Data Streams
- DID
- IPFS
- Blockchain
- Event Streaming
apis:
- name: Ceramic HTTP API
  description: The Ceramic HTTP API is the standard lowest-level communication protocol
    between clients and nodes on the Ceramic network, allowing applications to create
    events, read stream state, manage interests, and monitor the event feed.
  image: https://ceramic.network/favicon.ico
  humanURL: https://developers.ceramic.network/build/http/api/
